<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Meal Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 620px;
      margin-top: 2rem;
    }

    h1 { font-size: 1.4rem; font-weight: 600; color: #f1f5f9; margin-bottom: 0.25rem; }
    .subtitle { font-size: 0.875rem; color: #64748b; margin-bottom: 1.75rem; }

    .drop-zone {
      border: 2px dashed #2d3148;
      border-radius: 8px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #6366f1; background: rgba(99,102,241,0.05); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .drop-zone p { color: #94a3b8; font-size: 0.9rem; }
    .drop-zone span { color: #818cf8; font-weight: 500; }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .preview-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; border: 1px solid #2d3148; }

    .btn {
      display: block; width: 100%; margin-top: 1.25rem; padding: 0.75rem;
      background: #6366f1; color: #fff; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 500; cursor: pointer; transition: background 0.2s;
    }
    .btn:hover:not(:disabled) { background: #4f46e5; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status { margin-top: 1rem; font-size: 0.875rem; text-align: center; min-height: 1.25rem; color: #94a3b8; }
    .status.error { color: #f87171; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #6366f1; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .results { margin-top: 1.5rem; display: none; }
    .results.show { display: block; }

    .stat-row {
      display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap;
    }
    .stat {
      flex: 1; min-width: 120px; background: #12141e; border: 1px solid #2d3148;
      border-radius: 8px; padding: 0.75rem 1rem; text-align: center;
    }
    .stat-value { font-size: 1.6rem; font-weight: 700; color: #818cf8; }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 0.2rem; }

    .section { margin-bottom: 1.25rem; }
    .section-title {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #475569; margin-bottom: 0.5rem;
    }

    .recipe-list { list-style: none; }
    .recipe-list li {
      padding: 0.4rem 0; border-bottom: 1px solid #1e2235;
      font-size: 0.875rem; display: flex; justify-content: space-between; align-items: center;
    }
    .recipe-list li:last-child { border-bottom: none; }
    .recipe-list a { color: #818cf8; text-decoration: none; font-size: 0.8rem; }
    .recipe-list a:hover { text-decoration: underline; }

    .tag {
      font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px;
      background: rgba(99,102,241,0.15); color: #a5b4fc; margin-left: 0.4rem;
    }

    .shopping-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: #12141e; border: 1px solid #2d3148; border-radius: 8px;
      padding: 0.6rem 1rem; font-size: 0.875rem; color: #818cf8;
      text-decoration: none; transition: border-color 0.2s;
    }
    .shopping-link:hover { border-color: #6366f1; }

    .plan-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.5rem;
    }
    .plan-day {
      background: #12141e; border: 1px solid #2d3148; border-radius: 6px; padding: 0.5rem 0.75rem;
    }
    .plan-day-date { font-size: 0.7rem; color: #475569; margin-bottom: 0.2rem; }
    .plan-day-name { font-size: 0.8rem; color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ad Meal Planner</h1>
    <p class="subtitle">Upload photos of your weekly grocery circular to build a meal plan in Mealie.</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" multiple />
      <div class="drop-icon">📷</div>
      <p><span>Click to upload</span> or drag and drop</p>
      <p>JPG, PNG, WEBP — multiple pages OK</p>
    </div>

    <div class="preview-grid" id="previewGrid"></div>
    <button class="btn" id="submitBtn" disabled>Generate Meal Plan</button>
    <div class="status" id="status"></div>

    <div class="results" id="results">
      <div class="stat-row" id="statRow"></div>

      <div class="section" id="planSection" style="display:none">
        <div class="section-title">This Week's Meal Plan</div>
        <div class="plan-grid" id="planGrid"></div>
      </div>

      <div class="section" id="newSection" style="display:none">
        <div class="section-title">New Recipes Added to Mealie</div>
        <ul class="recipe-list" id="newList"></ul>
      </div>

      <div class="section" id="matchedSection" style="display:none">
        <div class="section-title">Existing Recipes Matched</div>
        <ul class="recipe-list" id="matchedList"></ul>
      </div>

      <div class="section" id="shoppingSection" style="display:none">
        <div class="section-title">Shopping List</div>
        <a class="shopping-link" id="shoppingLink" href="#" target="_blank">
          🛒 <span id="shoppingLabel"></span>
        </a>
      </div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const previewGrid = document.getElementById('previewGrid');
    const submitBtn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    let selectedFiles = [];

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('drag-over');
      handleFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

    function handleFiles(files) {
      selectedFiles = files.filter(f => f.type.startsWith('image/'));
      previewGrid.innerHTML = '';
      selectedFiles.forEach(f => {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(f);
        previewGrid.appendChild(img);
      });
      submitBtn.disabled = selectedFiles.length === 0;
    }

    function showResults(data) {
      const results = document.getElementById('results');
      results.classList.add('show');

      // Stats
      const statRow = document.getElementById('statRow');
      statRow.innerHTML = `
        <div class="stat"><div class="stat-value">${data.sale_items_found}</div><div class="stat-label">Sale Items Found</div></div>
        <div class="stat"><div class="stat-value">${data.meal_plan.length}</div><div class="stat-label">Meals Planned</div></div>
        <div class="stat"><div class="stat-value">${data.shopping_list.items}</div><div class="stat-label">Shopping Items</div></div>
      `;

      // Meal plan
      if (data.meal_plan.length) {
        document.getElementById('planSection').style.display = 'block';
        const grid = document.getElementById('planGrid');
        grid.innerHTML = data.meal_plan.map(e => `
          <div class="plan-day">
            <div class="plan-day-date">${new Date(e.date + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'})}</div>
            <div class="plan-day-name">${e.recipe}</div>
          </div>
        `).join('');
      }

      // New recipes
      if (data.new_recipes.length) {
        document.getElementById('newSection').style.display = 'block';
        const list = document.getElementById('newList');
        list.innerHTML = data.new_recipes.map(r => `
          <li>
            <span>${r.name}</span>
            ${r.url ? `<a href="${r.url}" target="_blank">View in Mealie →</a>` : ''}
          </li>
        `).join('');
      }

      // Matched recipes
      if (data.existing_recipes_matched.length) {
        document.getElementById('matchedSection').style.display = 'block';
        const list = document.getElementById('matchedList');
        list.innerHTML = data.existing_recipes_matched.map(r => `
          <li>
            <span>
              ${r.name}
              ${r.matched_sales.slice(0,3).map(s => `<span class="tag">${s}</span>`).join('')}
            </span>
            <a href="${r.url}" target="_blank">View →</a>
          </li>
        `).join('');
      }

      // Shopping list
      if (data.shopping_list.url) {
        document.getElementById('shoppingSection').style.display = 'block';
        const link = document.getElementById('shoppingLink');
        link.href = data.shopping_list.url;
        document.getElementById('shoppingLabel').textContent =
          `${data.shopping_list.name} — ${data.shopping_list.items} items`;
      }
    }

    submitBtn.addEventListener('click', async () => {
      if (!selectedFiles.length) return;
      submitBtn.disabled = true;
      document.getElementById('results').classList.remove('show');
      status.className = 'status';
      status.innerHTML = '<span class="spinner"></span> Processing — this takes 30–60 seconds…';

      const form = new FormData();
      selectedFiles.forEach(f => form.append('images', f));

      try {
        const res = await fetch('/api/plan', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        status.textContent = '';
        showResults(data);
      } catch (err) {
        status.className = 'status error';
        status.textContent = `Error: ${err.message}`;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
